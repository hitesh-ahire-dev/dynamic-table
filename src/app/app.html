<div class="container">
  <div class="header">
    <h2>Dynamic Engagement Table</h2>
    <div class="controls">
      <label for="duration">Contract Duration (Years): </label>
      <input id="duration" type="number" min="1" max="10" [(ngModel)]="contractDurationYears"
        (ngModelChange)="onDurationChange()" class="duration-input" />
    </div>
  </div>

  <app-dynamic-table #table></app-dynamic-table>

  <div class="json-preview">
    <h3>Live JSON Data Preview</h3>
    <pre>{{ tableData() | json }}</pre>
  </div>
</div>
